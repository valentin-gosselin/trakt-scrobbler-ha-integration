      example: movie
      selector:
        select:
          options:
            - movie
            - show
    title:
      name: Title
      required: false
      selector:
        text:
    trakt:
      name: Trakt ID
      required: false
      selector:
        text:
    imdb:
      name: IMDb ID
      required: false
      selector:
        text:
    tmdb:
      name: TMDB ID
      required: false
      selector:
        text:
    tvdb:
      name: TVDB ID
      required: false
      selector:
        text:

mark_watched:
  name: Mark watched
  description: Mark a movie or an episode as watched on Trakt.
  fields:
    media_type:
      name: Media type
      description: movie, or episode.
      required: true
      example: episode
      selector:
        select:
          options:
            - movie
            - episode
    title:
      name: Title
      description: Movie title (for movies without an id).
      required: false
      selector:
        text:
    year:
      name: Year
      required: false
      selector:
        number:
          min: 1900
          max: 2100
          mode: box
    season:
      name: Season
      description: Season number (episodes, with show ids).
      required: false
      selector:
        number:
          min: 0
          max: 100
          mode: box
    episode:
      name: Episode
      description: Episode number (episodes, with show ids).
      required: false
      selector:
        number:
          min: 0
          max: 1000
          mode: box
    trakt:
      name: Trakt ID
      required: false
      selector:
        text:
    imdb:
      name: IMDb ID
      required: false
      selector:
        text:
    tmdb:
      name: TMDB ID
      required: false
      selector:
        text:
    tvdb:
      name: TVDB ID
      required: false
      selector:
        text:
