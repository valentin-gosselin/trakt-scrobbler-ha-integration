import_plex_history:
  name: Import Plex history
  description: >-
    Backfill your Trakt history from the Plex server watch history. Reads Plex
    history from the given start date and adds anything not already on Trakt,
    using the real watch date. Deduplicated against your existing Trakt history.
  fields:
    start_date:
      name: Start date
      description: >-
        Only import Plex history watched on or after this date/time. Defaults to
        the last 30 days if omitted. Set this to your TV Time import date for the
        initial backfill.
      required: false
      example: "2025-01-01 00:00:00"
      selector:
        datetime:
    dry_run:
      name: Dry run
      description: >-
        When enabled (default), nothing is sent to Trakt. The items that would
        be added are only written to the log so you can review them first.
      required: false
      default: true
      selector:
        boolean:

add_to_watchlist:
  name: Add to watchlist
  description: Add a movie or show to your Trakt watchlist.
  fields:
    media_type:
      name: Media type
      description: Whether the item is a movie or a show.
      required: true
      example: movie
      selector:
        select:
          options:
            - movie
            - show
    title:
      name: Title
      description: Title to look up (used if no id is given).
      required: false
      example: The Bear
      selector:
        text:
    year:
      name: Year
      required: false
      example: 2022
      selector:
        number:
          min: 1900
          max: 2100
          mode: box
    trakt:
      name: Trakt ID
      required: false
      selector:
        text:
    imdb:
      name: IMDb ID
      required: false
      example: tt1234567
      selector:
        text:
    tmdb:
      name: TMDB ID
      required: false
      selector:
        text:
    tvdb:
      name: TVDB ID
      required: false
      selector:
        text:

remove_from_watchlist:
